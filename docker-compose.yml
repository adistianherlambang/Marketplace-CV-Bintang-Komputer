version: '3.8'

services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bintang_jaya_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - bintang_jaya_net

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: bintang_jaya_web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bintang_jaya_net
    depends_on:
      - app

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: bintang_jaya_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: bintang_jaya_db
      MYSQL_USER: bintang_jaya_user
      MYSQL_PASSWORD: bintang_jaya_pass
      MYSQL_ROOT_PASSWORD: root_secret_pass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bintang_jaya_net

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bintang_jaya_phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_secret_pass
    networks:
      - bintang_jaya_net
    depends_on:
      - db

networks:
  bintang_jaya_net:
    driver: bridge

volumes:
  db_data:
    driver: local
